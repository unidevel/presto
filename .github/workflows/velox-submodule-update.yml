name: Advance velox

on:
  schedule:
    - cron: 0 9 * * * # Daily at 09:00 UTC
  workflow_dispatch:
    inputs:
      force_advance:
        description: Force advance velox
        required: false
        default: false
        type: boolean

env:
  NOTIFICATION_GROUP: ${{ vars.VELOX_UPDATE_NOTIFICATION_GROUP || '@prestodb/team-velox' }}
  BASE_BRANCH: ${{ github.event_name == 'schedule' && 'master' || github.ref_name }}
  VELOX_UPDATE_BRANCH: ${{ vars.VELOX_UPDATE_BRANCH || 'velox-update' }}
  FORCE_ADVANCE: ${{ github.event_name == 'schedule' || github.event.inputs.force_advance == 'true' }}

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.pr_info.outputs.pr_number }}
      pr_url: ${{ steps.pr_info.outputs.pr_url }}
      should_monitor: ${{ steps.pr_info.outputs.should_monitor }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRESTODB_CI_TOKEN }}
          ref: ${{ env.BASE_BRANCH }}
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          BASE_BRANCH: ${{ env.BASE_BRANCH }}
          VELOX_UPDATE_BRANCH: ${{ env.VELOX_UPDATE_BRANCH }}
        run: |
          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$VELOX_UPDATE_BRANCH" --base "$BASE_BRANCH" --state open --json number,url --jq '.[0]')

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')

            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "Found existing PR #$PR_NUMBER: $PR_URL"
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found"
          fi

      - name: Check for new Velox changes
        id: check_new_changes
        env:
          PR_EXISTS: ${{ steps.check_pr.outputs.pr_exists }}
          VELOX_UPDATE_BRANCH: ${{ env.VELOX_UPDATE_BRANCH }}
          FORCE_ADVANCE: ${{ env.FORCE_ADVANCE }}
        run: |
          # Determine which commit to use as "current"
          # If force_advance is true, always use base branch (treat as new PR)
          # If PR exists and not forcing, use commit from PR branch
          # Otherwise use base branch
          if [ "$FORCE_ADVANCE" = "true" ]; then
            # Force advance: always use base branch's velox commit
            CURRENT_COMMIT=$(cd presto-native-execution/velox && git rev-parse HEAD)
            echo "Force advance mode: using base branch's velox commit"
          elif [ "$PR_EXISTS" = "true" ]; then
            # PR exists and not forcing: try to get velox commit from the PR branch
            if git fetch origin "$VELOX_UPDATE_BRANCH" 2>/dev/null; then
              # Get the velox submodule commit from the PR branch
              CURRENT_COMMIT=$(git ls-tree "origin/$VELOX_UPDATE_BRANCH" presto-native-execution/velox | awk '{print $3}')
              echo "Using velox commit from PR branch: $VELOX_UPDATE_BRANCH"
            else
              # Branch doesn't exist yet, use current HEAD's velox commit
              CURRENT_COMMIT=$(cd presto-native-execution/velox && git rev-parse HEAD)
              echo "PR branch not found, using current HEAD's velox commit"
            fi
          else
            # No PR exists, use current HEAD's velox commit
            CURRENT_COMMIT=$(cd presto-native-execution/velox && git rev-parse HEAD)
            echo "No PR exists: using base branch's velox commit"
          fi

          # Get commit details for current commit
          cd presto-native-execution/velox
          CURRENT_COMMIT_SHORT=$(git rev-parse --short $CURRENT_COMMIT)
          CURRENT_DATE=$(git show -s --format=%ci $CURRENT_COMMIT | cut -d' ' -f1)
          CURRENT_TITLE=$(git show -s --format=%s $CURRENT_COMMIT)

          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "current_commit_short=$CURRENT_COMMIT_SHORT" >> $GITHUB_OUTPUT
          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "current_title=$CURRENT_TITLE" >> $GITHUB_OUTPUT

          # Fetch latest from velox main branch
          git fetch origin main
          LATEST_COMMIT=$(git rev-parse origin/main)
          LATEST_COMMIT_SHORT=$(git rev-parse --short origin/main)
          LATEST_DATE=$(git show -s --format=%ci origin/main | cut -d' ' -f1)
          LATEST_TITLE=$(git show -s --format=%s origin/main)

          echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "latest_commit_short=$LATEST_COMMIT_SHORT" >> $GITHUB_OUTPUT
          echo "latest_date=$LATEST_DATE" >> $GITHUB_OUTPUT
          echo "latest_title=$LATEST_TITLE" >> $GITHUB_OUTPUT

          if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "new_changes_available=true" >> $GITHUB_OUTPUT
            echo "New Velox changes available: $CURRENT_COMMIT -> $LATEST_COMMIT"
          else
            echo "new_changes_available=false" >> $GITHUB_OUTPUT
            echo "Velox is up to date at commit: $CURRENT_COMMIT"
          fi

      - name: Notify about new changes on existing PR
        if: steps.check_pr.outputs.pr_exists == 'true' && steps.check_new_changes.outputs.new_changes_available == 'true' && env.FORCE_ADVANCE != 'true'
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          PR_NUMBER: ${{ steps.check_pr.outputs.pr_number }}
          CURRENT_COMMIT_SHORT: ${{ steps.check_new_changes.outputs.current_commit_short }}
          CURRENT_DATE: ${{ steps.check_new_changes.outputs.current_date }}
          CURRENT_TITLE: ${{ steps.check_new_changes.outputs.current_title }}
          CURRENT_COMMIT: ${{ steps.check_new_changes.outputs.current_commit }}
          LATEST_COMMIT_SHORT: ${{ steps.check_new_changes.outputs.latest_commit_short }}
          LATEST_DATE: ${{ steps.check_new_changes.outputs.latest_date }}
          LATEST_TITLE: ${{ steps.check_new_changes.outputs.latest_title }}
          LATEST_COMMIT: ${{ steps.check_new_changes.outputs.latest_commit }}
          NOTIFICATION_GROUP: ${{ env.NOTIFICATION_GROUP }}
        run: |
          VELOX_REPO_URL="https://github.com/facebookincubator/velox"

          gh pr comment "$PR_NUMBER" --body "🔔 **New Velox Changes Available**

          New changes are available in the Velox repository:

          - **Current commit:** \`$CURRENT_COMMIT_SHORT\` $CURRENT_DATE [$CURRENT_TITLE]($VELOX_REPO_URL/commits/$CURRENT_COMMIT)
          - **Latest commit:** \`$LATEST_COMMIT_SHORT\` $LATEST_DATE [$LATEST_TITLE]($VELOX_REPO_URL/commits/$LATEST_COMMIT)

          $NOTIFICATION_GROUP To update this PR with the latest changes, re-run this workflow with \`force_advance: true\`."

      - name: Update Velox submodule
        if: (steps.check_pr.outputs.pr_exists != 'true' || env.FORCE_ADVANCE == 'true') && steps.check_new_changes.outputs.new_changes_available == 'true'
        run: |
          git -C presto-native-execution/velox checkout main
          git -C presto-native-execution/velox pull

      - name: Check for changes after update
        if: (steps.check_pr.outputs.pr_exists != 'true' || env.FORCE_ADVANCE == 'true') && steps.check_new_changes.outputs.new_changes_available == 'true'
        id: check_changes
        run: |
          if git diff --quiet presto-native-execution/velox; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in Velox submodule"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            VELOX_COMMIT=$(cd presto-native-execution/velox && git rev-parse HEAD)
            echo "velox_commit=$VELOX_COMMIT" >> $GITHUB_OUTPUT
            echo "Changes detected in Velox submodule (commit: $VELOX_COMMIT)"
          fi

      - name: Create branch and push changes
        if: (steps.check_pr.outputs.pr_exists != 'true' || env.FORCE_ADVANCE == 'true') && steps.check_changes.outputs.has_changes == 'true'
        env:
          BASE_BRANCH: ${{ env.BASE_BRANCH }}
          VELOX_UPDATE_BRANCH: ${{ env.VELOX_UPDATE_BRANCH }}
          VELOX_COMMIT: ${{ steps.check_changes.outputs.velox_commit }}
          GITHUB_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Configure git remote with token for pushing (since persist-credentials: false)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Ensure we're on the base branch
          git checkout "$BASE_BRANCH"
          # Create and switch to new branch (or switch if it exists)
          git checkout -B "$VELOX_UPDATE_BRANCH"
          # Stage the submodule changes
          git add presto-native-execution/velox
          # Commit the changes
          git commit -m "Update Velox submodule to $VELOX_COMMIT"
          # Force push the branch to handle updates
          git push -f origin "$VELOX_UPDATE_BRANCH"

      - name: Create or Update Pull Request
        if: (steps.check_pr.outputs.pr_exists != 'true' || env.FORCE_ADVANCE == 'true') && steps.check_changes.outputs.has_changes == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          BASE_BRANCH: ${{ env.BASE_BRANCH }}
          VELOX_UPDATE_BRANCH: ${{ env.VELOX_UPDATE_BRANCH }}
          PR_EXISTS: ${{ steps.check_pr.outputs.pr_exists }}
          PR_NUMBER: ${{ steps.check_pr.outputs.pr_number }}
          PR_URL: ${{ steps.check_pr.outputs.pr_url }}
          LATEST_COMMIT_SHORT: ${{ steps.check_new_changes.outputs.latest_commit_short }}
          LATEST_DATE: ${{ steps.check_new_changes.outputs.latest_date }}
          LATEST_TITLE: ${{ steps.check_new_changes.outputs.latest_title }}
          LATEST_COMMIT: ${{ steps.check_new_changes.outputs.latest_commit }}
        run: |
          PR_TITLE="chore(ci): Advance velox ($(date +'%Y-%m-%d'))"

          # Create PR body file (used for both new and existing PRs)
          cat > /tmp/pr_body.txt <<EOF
          **Velox Update Information:**
          - **Commit:** \`$LATEST_COMMIT_SHORT\` $LATEST_DATE [$LATEST_TITLE](https://github.com/facebookincubator/velox/commits/$LATEST_COMMIT)

          ---

          \`\`\`
          == NO RELEASE NOTE ==
          \`\`\`

          ## Summary by Sourcery

          Chores:
          - Update the Velox dependency reference under presto-native-execution to the latest desired commit.
          EOF

          if [ "$PR_EXISTS" = "true" ]; then
            # PR exists, update it

            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_exists=true" >> $GITHUB_OUTPUT

            gh pr edit "$PR_NUMBER" \
              --title "$PR_TITLE" \
              --body-file /tmp/pr_body.txt
            echo "Updated existing PR #$PR_NUMBER with new title and body"
          else
            # No existing PR, create new one
            PR_URL=$(gh pr create \
              --title "$PR_TITLE" \
              --body-file /tmp/pr_body.txt \
              --base "$BASE_BRANCH" \
              --head "$VELOX_UPDATE_BRANCH")

            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "Created new PR #$PR_NUMBER: $PR_URL"
          fi

      - name: Set PR info for monitoring
        id: pr_info
        env:
          PR_EXISTS: ${{ steps.check_pr.outputs.pr_exists }}
          FORCE_ADVANCE: ${{ env.FORCE_ADVANCE }}
          CHECK_PR_NUMBER: ${{ steps.check_pr.outputs.pr_number }}
          CHECK_PR_URL: ${{ steps.check_pr.outputs.pr_url }}
          CREATE_PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
          CREATE_PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          if [ "$PR_EXISTS" = "true" ] && [ "$FORCE_ADVANCE" != "true" ]; then
            # Use existing PR info
            echo "pr_number=$CHECK_PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$CHECK_PR_URL" >> $GITHUB_OUTPUT
          else
            # Use newly created/updated PR info
            echo "pr_number=$CREATE_PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$CREATE_PR_URL" >> $GITHUB_OUTPUT
          fi

          # Determine if we should monitor CI
          if [ -n "$CHECK_PR_NUMBER" ] || [ -n "$CREATE_PR_NUMBER" ]; then
            echo "should_monitor=true" >> $GITHUB_OUTPUT
          else
            echo "should_monitor=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        env:
          PR_EXISTS: ${{ steps.check_pr.outputs.pr_exists }}
          FORCE_ADVANCE: ${{ env.FORCE_ADVANCE }}
          PR_URL: ${{ steps.pr_info.outputs.pr_url }}
          NEW_CHANGES_AVAILABLE: ${{ steps.check_new_changes.outputs.new_changes_available }}
          CURRENT_COMMIT_SHORT: ${{ steps.check_new_changes.outputs.current_commit_short }}
          CURRENT_DATE: ${{ steps.check_new_changes.outputs.current_date }}
          CURRENT_TITLE: ${{ steps.check_new_changes.outputs.current_title }}
          CURRENT_COMMIT: ${{ steps.check_new_changes.outputs.current_commit }}
          LATEST_COMMIT_SHORT: ${{ steps.check_new_changes.outputs.latest_commit_short }}
          LATEST_DATE: ${{ steps.check_new_changes.outputs.latest_date }}
          LATEST_TITLE: ${{ steps.check_new_changes.outputs.latest_title }}
          LATEST_COMMIT: ${{ steps.check_new_changes.outputs.latest_commit }}
          HAS_CHANGES: ${{ steps.check_changes.outputs.has_changes }}
          VELOX_COMMIT: ${{ steps.check_changes.outputs.velox_commit }}
        run: |
          echo "## Create PR Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if we updated or just monitored existing PR
          if [ "$PR_EXISTS" = "true" ] && [ "$FORCE_ADVANCE" != "true" ]; then
            echo "ℹ️ Existing PR found" >> $GITHUB_STEP_SUMMARY
            echo "📝 Pull Request: $PR_URL" >> $GITHUB_STEP_SUMMARY

            # Check if new changes are available
            if [ "$NEW_CHANGES_AVAILABLE" = "true" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "🔔 **New Velox changes available:**" >> $GITHUB_STEP_SUMMARY
              echo "- **Current commit:** \`$CURRENT_COMMIT_SHORT\` $CURRENT_DATE [$CURRENT_TITLE](https://github.com/facebookincubator/velox/commits/$CURRENT_COMMIT)" >> $GITHUB_STEP_SUMMARY
              echo "- **Latest commit:** \`$LATEST_COMMIT_SHORT\` $LATEST_DATE [$LATEST_TITLE](https://github.com/facebookincubator/velox/commits/$LATEST_COMMIT)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "💡 Re-run with \`force_advance: true\` to update the PR" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$NEW_CHANGES_AVAILABLE" = "false" ]; then
            echo "ℹ️ Velox is up to date at commit: \`$CURRENT_COMMIT_SHORT\` $CURRENT_DATE [$CURRENT_TITLE](https://github.com/facebookincubator/velox/commits/$CURRENT_COMMIT)" >> $GITHUB_STEP_SUMMARY
          elif [ "$HAS_CHANGES" = "true" ]; then
            echo "✅ Velox submodule updated to commit: \`$LATEST_COMMIT_SHORT\` $LATEST_DATE [$LATEST_TITLE](https://github.com/facebookincubator/velox/commits/$LATEST_COMMIT)" >> $GITHUB_STEP_SUMMARY
            echo "📝 Pull Request: $PR_URL" >> $GITHUB_STEP_SUMMARY
          fi

  check-status:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    needs: create-pr
    if: needs.create-pr.outputs.should_monitor == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VELOX_UPDATE_BRANCH }}
          persist-credentials: false

      - name: Wait for CI checks to start
        run: |
          echo "Waiting 30 seconds for CI checks to initialize..."
          sleep 30

      - name: Monitor CI status
        id: ci_status
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
        run: |
          MAX_ATTEMPTS=600  # Wait up to 5 hours (600 * 30 seconds)
          ATTEMPT=0

          echo "Monitoring CI status for PR #$PR_NUMBER..."

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # Get the check runs status using available fields
            echo "Attempting to fetch PR checks..."
            CHECKS_JSON=$(gh pr checks $PR_NUMBER --json state,name,workflow 2>&1)
            EXIT_CODE=$?

            if [ $EXIT_CODE -ne 0 ]; then
              echo "Error fetching PR checks (exit code: $EXIT_CODE):"
              echo "$CHECKS_JSON"
              CHECKS_JSON="[]"
            fi

            # Check if there are any checks
            if [ "$CHECKS_JSON" = "[]" ] || [ -z "$CHECKS_JSON" ]; then
              echo "No CI checks found yet, waiting..."
              ATTEMPT=$((ATTEMPT + 1))
              sleep 30
              continue
            fi

            # Get all states
            STATES=$(echo "$CHECKS_JSON" | jq -r '.[].state' | sort -u)

            # Check if all checks are completed (no PENDING, QUEUED, or IN_PROGRESS)
            if ! echo "$STATES" | grep -qE "PENDING|QUEUED|IN_PROGRESS"; then
              # All checks completed, check for failures
              if echo "$STATES" | grep -qE "FAILURE|CANCELLED|TIMED_OUT|ERROR"; then
                echo "ci_result=failure" >> $GITHUB_OUTPUT
                echo "CI checks failed"
                echo "Check states: $STATES"
                exit 0
              elif echo "$STATES" | grep -q "SUCCESS"; then
                # Check if ALL checks are successful
                FAILED_COUNT=$(echo "$CHECKS_JSON" | jq '[.[] | select(.state != "SUCCESS")] | length')
                if [ "$FAILED_COUNT" -eq 0 ]; then
                  echo "ci_result=success" >> $GITHUB_OUTPUT
                  echo "All CI checks passed"
                  exit 0
                else
                  echo "ci_result=failure" >> $GITHUB_OUTPUT
                  echo "Some CI checks failed"
                  echo "Check states: $STATES"
                  exit 0
                fi
              else
                # All checks are in terminal states (SKIPPED, NEUTRAL, etc.) but no SUCCESS or FAILURE
                # Treat as failure since no successful checks ran
                echo "ci_result=failure" >> $GITHUB_OUTPUT
                echo "CI checks completed with non-success states: $STATES"
                echo "No successful checks found, treating as failure"
                exit 0
              fi
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - CI still running..."
            echo "Current states: $STATES"
            sleep 30
          done

          echo "ci_result=timeout" >> $GITHUB_OUTPUT
          echo "CI monitoring timed out after 5 hours"

      - name: Notify on CI success
        if: steps.ci_status.outputs.ci_result == 'success'
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          NOTIFICATION_GROUP: ${{ vars.VELOX_UPDATE_NOTIFICATION_GROUP || '@prestodb/team-velox' }}
        run: |
          gh pr comment "$PR_NUMBER" --body "✅ **CI Checks Passed**

          All CI checks have completed successfully for this Velox submodule update.

          $NOTIFICATION_GROUP This PR is ready for review."

      - name: Notify on CI failure
        if: steps.ci_status.outputs.ci_result == 'failure'
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          NOTIFICATION_GROUP: ${{ vars.VELOX_UPDATE_NOTIFICATION_GROUP || '@prestodb/team-velox' }}
        run: |
          gh pr comment "$PR_NUMBER" --body "❌ **CI Checks Failed**

          Some CI checks have failed for this Velox submodule update.

          $NOTIFICATION_GROUP Please review the failed checks and take appropriate action."

      - name: Notify on CI timeout
        if: steps.ci_status.outputs.ci_result == 'timeout'
        env:
          GH_TOKEN: ${{ secrets.PRESTODB_CI_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          NOTIFICATION_GROUP: ${{ vars.VELOX_UPDATE_NOTIFICATION_GROUP || '@prestodb/team-velox' }}
        run: |
          gh pr comment "$PR_NUMBER" --body "⏱️ **CI Monitoring Timeout**

          CI checks are still running after 5 hours of monitoring.

          $NOTIFICATION_GROUP Please check the CI status and re-run this action."

      - name: Summary
        if: always()
        env:
          CI_RESULT: ${{ steps.ci_status.outputs.ci_result }}
          PR_URL: ${{ needs.create-pr.outputs.pr_url }}
        run: |
          echo "## Check Status Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 Pull Request: $PR_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show CI status
          if [ "$CI_RESULT" = "success" ]; then
            echo "✅ CI Status: All checks passed" >> $GITHUB_STEP_SUMMARY
          elif [ "$CI_RESULT" = "failure" ]; then
            echo "❌ CI Status: Some checks failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "$CI_RESULT" = "timeout" ]; then
            echo "⏱️ CI Status: Monitoring timed out" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
